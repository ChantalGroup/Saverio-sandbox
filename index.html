<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D GLB Viewer Demo</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #f0f0f0;
    }
    header {
      padding: 1rem;
      background: #333;
      color: white;
      text-align: center;
    }
    model-viewer {
      flex: 1;
      width: 100%;
      background-color: #eee;
    }
    .controls {
      padding: 1rem;
      background: white;
      display: flex;
      justify-content: center;
      gap: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>3D GLB Viewer Demo</h1>
  </header>

  <model-viewer 
    id="viewer"
    src="public/assets/3d/SM_Interaction_01.glb" 
    alt="SM_Interaction_01 3D Model" 
    auto-rotate 
    camera-controls 
    ar 
    shadow-intensity="1">
  </model-viewer>

  <div class="controls">
    <p>Modello visualizzato: <code>SM_Interaction_01.glb</code></p>
  </div>
</body>
</html>
