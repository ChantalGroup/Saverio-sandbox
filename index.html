<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D GLB Viewer Demo</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #f0f0f0;
    }
    header {
      padding: 1rem;
      background: #333;
      color: white;
      text-align: center;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.2rem;
      flex-grow: 1;
    }
    .debug-btn {
      padding: 0.5rem 1rem;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    .debug-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 350px;
      height: 100%;
      background: white;
      box-shadow: -2px 0 10px rgba(0,0,0,0.2);
      transition: right 0.3s ease;
      z-index: 1000;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .debug-panel.open {
      right: 0;
    }
    .debug-panel h2 {
      margin-top: 0;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.5rem;
    }
    .panel-section {
      border: 1px solid #eee;
      padding: 0.5rem;
      border-radius: 4px;
    }
    .panel-section h3 {
      margin-top: 0;
      font-size: 1rem;
    }
    .control-group {
      margin-bottom: 0.5rem;
      display: flex;
      flex-direction: column;
    }
    .control-group label {
      font-size: 0.8rem;
      margin-bottom: 0.2rem;
    }
    .export-btn {
      margin-top: 1rem;
      padding: 0.5rem;
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    model-viewer {
      flex: 1;
      width: 100%;
      background-color: #eee;
    }
    .controls {
      padding: 1rem;
      background: white;
      display: flex;
      justify-content: center;
      gap: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <div style="width: 120px;"></div> <!-- Spacer for centering -->
    <h1>Chantal - Virtual try on - POC 00.00 - Saverio Trapasso</h1>
    <button class="debug-btn" onclick="toggleDebug()">DEBUG LOOKDEV</button>
  </header>

  <div id="debugPanel" class="debug-panel">
    <h2>Debug Lookdev</h2>
    
    <div class="panel-section">
      <h3>Lighting</h3>
      <div class="control-group">
        <label>HDRI</label>
        <select id="hdriSelect">
          <option value="">Default</option>
          <option value="public/assets/hdri/studio_kominka_02_2k.exr">Studio Kominka</option>
          <option value="public/assets/hdri/tree_lined_driveway_2k.exr">Tree Lined Driveway</option>
          <option value="public/assets/hdri/wooden_studio_09_2k.exr">Wooden Studio</option>
        </select>
      </div>
      <div class="control-group">
        <label>Rotation</label>
        <input type="range" id="hdriRotation" min="0" max="360" value="0">
      </div>
      <div class="control-group">
        <label>Exposure</label>
        <input type="range" id="hdriExposure" min="0" max="2" step="0.01" value="1">
      </div>
    </div>

    <div class="panel-section">
      <h3>Materials</h3>
      <div id="materialsList">
        <!-- Will be populated by JS -->
      </div>
    </div>

    <button class="export-btn" onclick="exportJson()">Esporta JSON</button>
    <button class="debug-btn" style="background: #6c757d;" onclick="toggleDebug()">Chiudi</button>
  </div>

  <model-viewer 
    id="viewer"
    src="public/assets/3d/SM_Interaction_01.glb" 
    alt="SM_Interaction_01 3D Model" 
    camera-controls 
    ar 
    shadow-intensity="1"
    environment-image="public/assets/hdri/studio_kominka_02_2k.exr">
  </model-viewer>

  <script>
    const viewer = document.querySelector('#viewer');
    const debugPanel = document.getElementById('debugPanel');
    const hdriSelect = document.getElementById('hdriSelect');
    const hdriRotation = document.getElementById('hdriRotation');
    const hdriExposure = document.getElementById('hdriExposure');
    const materialsList = document.getElementById('materialsList');

    function toggleDebug() {
      debugPanel.classList.toggle('open');
      if (debugPanel.classList.contains('open')) {
        populateMaterials();
      }
    }

    // HDRI Controls
    hdriSelect.addEventListener('change', (e) => {
      viewer.environmentImage = e.target.value;
    });

    hdriRotation.addEventListener('input', (e) => {
      viewer.orientation = `0deg 0deg ${e.target.value}deg`;
    });

    hdriExposure.addEventListener('input', (e) => {
      viewer.exposure = e.target.value;
    });

    function populateMaterials() {
      materialsList.innerHTML = '';
      if (!viewer.model) return;

      viewer.model.materials.forEach((material, index) => {
        const section = document.createElement('div');
        section.className = 'control-group';
        section.style.borderTop = '1px solid #eee';
        section.style.paddingTop = '0.5rem';

        const name = document.createElement('label');
        name.innerHTML = `<strong>${material.name || 'Material ' + index}</strong>`;
        section.appendChild(name);

        // Base Color
        const colorLabel = document.createElement('label');
        colorLabel.innerText = 'Base Color';
        const colorInput = document.createElement('input');
        colorInput.type = 'color';
        const color = material.pbrMetallicRoughness.baseColorFactor;
        colorInput.value = rgbToHex(color[0], color[1], color[2]);
        colorInput.addEventListener('input', (e) => {
          const rgb = hexToRgb(e.target.value);
          material.pbrMetallicRoughness.setBaseColorFactor([rgb.r, rgb.g, rgb.b, color[3]]);
        });
        section.appendChild(colorLabel);
        section.appendChild(colorInput);

        // Metallic
        const metallicLabel = document.createElement('label');
        metallicLabel.innerText = 'Metallic';
        const metallicInput = document.createElement('input');
        metallicInput.type = 'range';
        metallicInput.min = 0;
        metallicInput.max = 1;
        metallicInput.step = 0.01;
        metallicInput.value = material.pbrMetallicRoughness.metallicFactor;
        metallicInput.addEventListener('input', (e) => {
          material.pbrMetallicRoughness.setMetallicFactor(parseFloat(e.target.value));
        });
        section.appendChild(metallicLabel);
        section.appendChild(metallicInput);

        // Roughness
        const roughnessLabel = document.createElement('label');
        roughnessLabel.innerText = 'Roughness';
        const roughnessInput = document.createElement('input');
        roughnessInput.type = 'range';
        roughnessInput.min = 0;
        roughnessInput.max = 1;
        roughnessInput.step = 0.01;
        roughnessInput.value = material.pbrMetallicRoughness.roughnessFactor;
        roughnessInput.addEventListener('input', (e) => {
          material.pbrMetallicRoughness.setRoughnessFactor(parseFloat(e.target.value));
        });
        section.appendChild(roughnessLabel);
        section.appendChild(roughnessInput);

        materialsList.appendChild(section);
      });
    }

    function rgbToHex(r, g, b) {
      const toHex = (c) => Math.round(c * 255).toString(16).padStart(2, '0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255;
      const g = parseInt(hex.slice(3, 5), 16) / 255;
      const b = parseInt(hex.slice(5, 7), 16) / 255;
      return { r, g, b };
    }

    function exportJson() {
      const data = {
        lighting: {
          hdri: hdriSelect.value,
          rotation: hdriRotation.value,
          exposure: hdriExposure.value
        },
        materials: viewer.model.materials.map(m => ({
          name: m.name,
          baseColorFactor: m.pbrMetallicRoughness.baseColorFactor,
          metallicFactor: m.pbrMetallicRoughness.metallicFactor,
          roughnessFactor: m.pbrMetallicRoughness.roughnessFactor
        }))
      };
      
      const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'lookdev_settings.json';
      a.click();
    }
  </script>

  <div class="controls" style="display:none;">
    <p>Modello visualizzato: <code>SM_Interaction_01.glb</code></p>
  </div>
</body>
</html>
